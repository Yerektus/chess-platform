services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      API_PORT: ${API_PORT:-8080}
      MONGODB_URI: mongodb://mongo:27017/chess-platform
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
